name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gmrfx_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      # GitHub Actions: hindari deprecation Node 20 untuk JavaScript actions (changelog 2025-09-19).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gmrfx_ci
      DATABASE_URL_UNPOOLED: postgresql://postgres:postgres@localhost:5432/gmrfx_ci
      AUTH_SECRET: ci-build-placeholder-secret-min-32-chars
      AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify critical migration file (urutan 20260329210000)
        run: node prisma/assert-migration-292100-fixed.cjs

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
